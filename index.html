<!DOCTYPE html>
<html>
<head>
  <title>Daily Inspiration</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #6a5acd, #20b2aa);
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    h1 {
      font-size: 2.5em;
      margin-bottom: 20px;
    }
    #quote {
      font-size: 1.5em;
      margin: 20px;
      font-style: italic;
    }
    button {
      padding: 10px 20px;
      font-size: 1em;
      border: none;
      border-radius: 5px;
      background-color: #ff6f61;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background-color: #ffb347;
    }
  </style>
</head>
<body>
  <h1>🌟 Daily Inspiration 🌟</h1>
  <p id="quote">Click the button for your quote!</p>
  <button onclick="newQuote()">Get Inspired</button>

  <script>
    const quotes = [
      "Believe you can and you're halfway there.",
      "Every day is a new chance to shine.",
      "Dream big, work hard, stay humble.",
      "Your potential is endless.",
      "Start where you are. Use what you have. Do what you can."
    ];

    function newQuote() {
      const randomIndex = Math.floor(Math.random() * quotes.length);
      document.getElementById("quote").innerText = quotes[randomIndex];
    }
  </script>
</body>
</html>
